<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Stock Viewer</title>

<!-- ================= UI STYLE ================= -->
<style>
  :root {
  /* ================= PHASE 3: TYPOGRAPHY / HIERARCHY ================= */
  --text-primary:   rgba(17,17,17,.92);
  --text-secondary: rgba(60,60,67,.82); /* 🔴 เพิ่มความคมชัด */
  --title-size:     22px;
  --subtitle-size:  12.5px;
  --title-weight:   700;
  --subtitle-weight:500;
    
  /* ================= STEP 2: SHADOW/DEPTH TOKENS (UNIFIED) ================= */
  --shadow-card:            0 10px 30px rgba(0,0,0,.08);
  --shadow-control:         0 6px 16px rgba(0,0,0,.08);
  --shadow-image:           0 4px 12px rgba(0,0,0,.12);  
  --shadow-header:          0 8px 28px rgba(0,0,0,.06);
  --shadow-header-scrolled: 0 12px 36px rgba(0,0,0,.12);
  /* card pressed should be card semantics (not control) */
  --shadow-card-pressed:    0 6px 18px rgba(0,0,0,.06);
  /* canvas export card shadow should follow tokens */
  --shadow-canvas-card:     var(--shadow-card);
  --shadow-side:            -6px 0 20px rgba(0,0,0,.12);
  --shadow-floating:        0 12px 36px rgba(0,0,0,.12);
  --shadow-fab:             0 10px 28px rgba(0,0,0,.14); 
  
  /* legacy alias (keep old refs working + follow unified override) */
  --shadow-float:           var(--shadow-floating);  
   
   /* ================= STEP 1: INTERACTION TOKENS ================= */
   /* Tap scale */
   --tap-scale-primary: .97;   /* primary / confirm */
   --tap-scale-icon:    .95;   /* icon circle buttons */
   --tap-scale-card:    .98;   /* cards should feel heavier */

   /* Durations */
   --dur-tap:   140ms;
   --dur-sheet: 300ms;
   --dur-chrome:360ms;

   /* Easings (keep minimal, iOS-like) */
   --ease-tap:   cubic-bezier(.2,.8,.2,1);
   --ease-out:   cubic-bezier(.22,.61,.36,1);
   --ease-chrome:cubic-bezier(.22,.61,.36,1); 
 }
  
  html, body {
  margin: 0;
  padding: 0;

  width: 100%;
  max-width: 100%;
  overflow-x: hidden;   /* 🔴 ตัวนี้คือหัวใจ */

  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  height: 100%;  
  min-height: 100%;
}

  body{
   min-height: 100dvh;
  }
  
  header{
  padding:
    calc(env(safe-area-inset-top, 0px) + 20px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    18px
    calc(env(safe-area-inset-left, 0px) + 16px);
  font-size: inherit;
  font-weight: inherit;

  /* 🔹 Visual */
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,.4);

  box-shadow:
    var(--shadow-header),
    inset 0 -1px 0 rgba(255,255,255,.35);

  /* 🔹 Position */
  position:sticky;
  top:0;
  z-index:50;

  /* 🔹 Layout (สำคัญ) */
  display:flex;
  justify-content:space-between;
  align-items:center;

  /* 🔴 FIX สำคัญ */
  min-height:110px;     /* รองรับ Search + Filter (STEP 5.2) */  
  box-sizing:border-box;

  transition:
    padding var(--dur-chrome) var(--ease-chrome),
    min-height var(--dur-chrome) var(--ease-chrome),
    background var(--dur-chrome) ease,
    box-shadow var(--dur-chrome) ease;
  }

  header.scrolled{
   padding:
    calc(env(safe-area-inset-top, 0px) + 12px)
    calc(env(safe-area-inset-right, 0px) + 16px)
    10px
    calc(env(safe-area-inset-left, 0px) + 16px);
   min-height: 72px;
   background: rgba(255,255,255,.85);
   box-shadow:
    var(--shadow-header-scrolled),
    inset 0 -1px 0 rgba(255,255,255,.5);
 } 

/* ================= SHOP TITLE GLOW ================= */
 .shop-title,
 .admin-title{
   font-weight: var(--title-weight);
  font-size: var(--title-size);
  letter-spacing: .15px;
  color: var(--text-primary);

  display: inline-flex;
  align-items: center;
  padding: 7px 12px;
  border-radius: 999px;
  position: relative;
  overflow: hidden;

  /* ✅ Match filter/menu/search: Apple-nimble glass */
  background: rgba(255,255,255,.55);
  border: 1px solid rgba(255,255,255,.45);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);
  /* ✅ add inner rim + same depth language as buttons */
  box-shadow:
    var(--shadow-control),
    inset 0 1px 0 rgba(255,255,255,.70),
    inset 0 -1px 0 rgba(255,255,255,.28);

  /* Apple-nimble: เงาเบามาก ไม่ glow */
  text-shadow: 0 1px 0 rgba(255,255,255,.35);
 }

/* ✅ Glass highlight (top-left glare) */
  .shop-title::before,
  .admin-title::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}
/* ✅ ensure text always above highlight (even when no child elements) */
.shop-title,
.admin-title{ z-index: 0; }
  
/* PHASE 3: Supporting line under title */
.shop-subtitle{
  margin-top: 6px;
  font-size: var(--subtitle-size);
  font-weight: var(--subtitle-weight);
  color: var(--text-secondary);
  letter-spacing: .2px;
}

/* ================= PHASE 3: HEADER HIERARCHY LAYOUT ================= */
.header-left{
  flex: 1;
  min-width: 0;
}
.header-stack{
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.header-actions{
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: 12px;
}  
  
/* ================= ADMIN TITLE (only delta) ================= */
 .admin-title{
   /* 🔴 CHANGED: ให้เหมือน shop-title 100% → ไม่ดันซ้ายด้วย margin */
   margin-left: 0;
 }
  
@media (prefers-color-scheme: dark){
  .admin-title{
    /* 🔴 CHANGED: ทำให้ rgba ถูกต้องตามมาตรฐาน (กัน rule หลุดในบาง browser) */
    color: rgba(255,255,255,.92);
    text-shadow:
      0 0 10px rgba(0,0,0,.70),
      0 0 22px rgba(0,0,0,.45);
  }
}
  
  .badge{
    color:#fff;
  border-radius:999px;
  padding:3px 10px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.2px;
  background: rgba(255,59,48,.88);
  border: 1px solid rgba(255,255,255,.28);
  box-shadow:
    0 10px 24px rgba(0,0,0,.14),
    inset 0 1px 0 rgba(255,255,255,.35);
  }
  .container{padding:16px;display:grid;gap:16px;}
  
  .card{
    background: rgba(255,255,255,.72);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-radius:18px;
  padding:14px;
  cursor:pointer;
  box-shadow: var(--shadow-card);
  }
  .name{
  font-weight:600;
  line-height:1.35;

  display:-webkit-box;
  -webkit-line-clamp:2;      /* จำกัด 2 บรรทัด */
  -webkit-box-orient:vertical;

  overflow:hidden;
  word-break:break-word;
}
  .price{color:#007aff;margin-top:4px;}
  .stock{font-size:14px;color:#666;}

  .backdrop{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.25);
  backdrop-filter: blur(2px);
  display: none;
  z-index: 100;
}

.sheet{
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  background: rgba(255,255,255,.85);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: 22px 22px 0 0;
  box-shadow: var(--shadow-float);

  padding: 20px 20px 24px; /* เว้นล่างให้หายอึดอัด */

  /* ✅ CORE FIX */
  max-height: calc(100dvh - 40px);   /* ใช้ dvh แทน vh */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

  transform: translateY(100%);
  transition: transform var(--dur-sheet) var(--ease-out);

  z-index: 101;
}

.sheet.show{
  transform: translateY(0);
}

.sheet h3{
  margin:0 0 12px;
}



/* ================= BASE INPUT (NEUTRAL) ================= */
input,
select {
  width: 100%;
  box-sizing: border-box;
  outline: none;
  font-family: inherit;
  background: rgba(255,255,255,.9);
  color: #111;                 /* 🔴 FIX: text มองเห็นชัดใน light mode */
}

/* 🔴 NEW: textarea base style (Light mode fix) */
textarea {
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
  background: #fff;
  color: #111;
  border: 1px solid #ddd;
  border-radius: 12px;
}
  
input::placeholder,
textarea::placeholder {
  color: #999;                 /* 🔴 FIX: placeholder ไม่จางเกินไป */
}  

input:focus,
select:focus {
  border-color: #007aff;
}

/* ================= STEP 3: FORM CONSISTENT ================= */

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.form-group label {
  font-size: 13px;
  color: #666;
}

/* ================= FORM INPUT (UNIFIED) ================= */

/* ทุก input / select ใน form + กัน iOS zoom */
.form-group input,
.form-group select {
  width: 100%;
  height: 44px;
  padding: 10px 12px;

  font-size: 16px;          /* 🔴 FIX iOS ZOOM */
  line-height: 1.2;

  border-radius: 12px;
  border: 1px solid #ddd;
  box-sizing: border-box;
  background: #fff;
  font-family: inherit;
}

/* number ต้องเหมือน text (iOS / Android) */
.form-group input[type="number"] {
  appearance: textfield;
  -moz-appearance: textfield;
}

/* focus state */
.form-group input:focus,
.form-group select:focus {
  border-color: #007aff;
  outline: none;
}

  /* ✅ เพิ่มตรงนี้ */
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

 .btn-remove{
  padding:6px 12px;
  border-radius:10px;
  background:#ff3b30;
  color:#fff;
  border:none;

  font-size:13px;
  font-weight:600;
  line-height:1;

  cursor:pointer;
 }
  /* ✅ เพิ่มตรงนี้ */
.btn-remove:active {
  transform: scale(var(--tap-scale-icon));
}

/* interaction: use .btn:active as single source of truth */
  
/* ================= BUTTON SYSTEM ================= */

.btn {
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition:
    transform var(--dur-tap) var(--ease-tap),
    box-shadow var(--dur-tap) ease;
}

/* Primary */
.btn-primary {
  background: #007aff;
  color: #fff;
}

/* Secondary (soft green) */
.btn-secondary {
  background: #34c759;
  color: #fff;
}

/* Outline (cancel / back) */
.btn-outline {
  background: #f2f2f7;
  color: #333;
  border: 1px solid #ddd;
}

/* Danger (logout / destructive) */
.btn-danger{
  background:#ff3b30;
  color:#fff;
}
.btn-danger:active{
  transform: scale(var(--tap-scale-primary));
}

/* Interaction */
.btn:active {
  transform: scale(var(--tap-scale-primary));
}

  .cart-item{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  padding:12px 0;
  border-bottom:1px dashed rgba(0,0,0,.08);
  }

 .cart-item > div:first-child {
   flex: 1;
   min-width: 0; /* 🔴 สำคัญมาก: ให้ text ถูกตัดได้ */
 }

 .cart-item > div:last-child {
   flex-shrink: 0;
   text-align: right;
 }

 .cart-item .price{
   margin-top:2px;
 }

 .cart-item-right{
   display:flex;
   align-items:center;   /* 🔴 หัวใจ: align กับราคา */
   gap:8px;
 }
 

  .total{
  font-size:18px;
  font-weight:700;
  text-align:right;
  margin-top:16px;
  padding-top:12px;
  border-top:1px solid rgba(0,0,0,.08);
  }

#cartSheet .btn-primary{
  margin-top:16px;
  margin-bottom:12px;
}

#cartSheet{
  padding-bottom: calc(env(safe-area-inset-bottom) + 28px);
}
  
  /* ===== Order Preview (Hidden) ===== */
  #orderPreview {
    width: 360px;
    padding: 16px;
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: none;
  }
  #orderPreview h2 {
    margin: 0 0 8px;
  }
  #orderPreview .item {
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    font-size:14px;
  }
  #orderPreview .footer {
    margin-top:12px;
    font-weight:700;
    text-align:right;
  }

/* ================= HEADER SEARCH (iOS-LIKE) ================= */
.viewer-search-wrap{
   margin-top:6px;
   max-width:100%;
 }  

.search-wrap {
  display: flex;
  align-items: center;
  position: relative;
  max-width: 100%;
  min-width: 0;          /* 🔴 กันดัน layout */
  overflow: visible;     /* ✅ ให้เงาปุ่มวงกลมไม่โดนตัดเป็นเหลี่ยม */
}

.search-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255,255,255,.45);
  position: relative;
  overflow: hidden;

  /* ✅ Match filter/menu: Apple-nimble glass */
  background: rgba(255,255,255,.55);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  box-shadow: var(--shadow-control);
  cursor: pointer;
  color: rgba(17,17,17,.92); /* svg uses currentColor */
  -webkit-tap-highlight-color: transparent;

  transition:
    transform var(--dur-tap) var(--ease-tap),
    background var(--dur-tap) ease,
    box-shadow var(--dur-tap) ease;
}

/* ✅ Glass highlight (same language as filter/menu) */
.search-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}
.search-btn::after{
  content:none;
}
.search-btn > *{ position: relative; z-index: 2; }
  
.search-btn:active {
  transform: scale(var(--tap-scale-icon));
  background: rgba(0,0,0,.08);
  box-shadow: var(--shadow-card-pressed);
}

@media (hover:hover){
  .search-btn:hover{
    background: rgba(0,0,0,.06);
  }
}
  
.search-input {
   width: 0;             /* 🔴 สำคัญ: ตอนยังไม่ active ต้องไม่กินพื้นที่ */
   opacity: 0;
   margin-left: 0;
   height: 40px;
   padding: 0;

   font-size: 16px;
   border-radius: 12px;
   border: 0;

   background: rgba(255,255,255,.85);
   color: #111;    /* ✅ อ่านชัดใน light mode */
   backdrop-filter: blur(14px);

  pointer-events: none;

  transform: translateX(-6px) scaleX(.6);
  transform-origin: left center;

  transition:
    opacity .18s ease,
    transform .45s cubic-bezier(.34,1.56,.64,1),
    width .35s ease,
    margin-left .35s ease,
    padding .35s ease;
}

/* 🔥 ACTIVE STATE */
.search-wrap.active .search-input {
  opacity: 1;
  transform: translateX(0) scaleX(1);
  pointer-events: auto;
  width: min(220px, calc(100vw - 200px)); /* 🔴 ลด/ยืดตามจอ ไม่ดัน filter+menu */
  margin-left: 8px;
  padding: 8px 12px;
  border: 1px solid rgba(0,0,0,.12);
}

/* 🔹 subtle focus glow (iOS feel) */
.search-input:focus {
  border-color: #007aff;
  box-shadow:
    0 0 0 3px rgba(0,122,255,.18);
  outline: none;
}

/* ✅ STEP 3+4: SVG icon (monochrome) */
.icon-sf{
  width: 18px;
  height: 18px;
  display: block;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: .92;
}
 /* ================= FILTER ICON DROPDOWN ================= */
 .filter-wrap{ position:relative; }

 .filter-btn{
   width:40px;
   height:40px;
   border-radius:50%;
   border:none;
   position: relative;          /* ✅ needed for glass layers */
   overflow: hidden;            /* ✅ clip highlight rim */
   
   /* ✅ Apple-nimble glass (less "3D") */
  background: rgba(255,255,255,.55);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);
   cursor:pointer;
   color: rgba(17,17,17,.92);
   display:flex;
   align-items:center;
   justify-content:center;
   -webkit-tap-highlight-color: transparent;
   transition:
     transform var(--dur-tap) var(--ease-tap),
     background var(--dur-tap) ease,
     box-shadow var(--dur-tap) ease;

   /* ✅ Token shadow (unified depth) */
  border: 1px solid rgba(255,255,255,.45);
  box-shadow: var(--shadow-control);
 }

 /* ✅ Glass highlight (top-left glare) */
.filter-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index: 0;
  background: radial-gradient(70% 55% at 28% 22%,
    rgba(255,255,255,.65) 0%,
    rgba(255,255,255,0) 58%);
  opacity:.45;
  pointer-events:none;
  mix-blend-mode: screen;
}

/* ✅ Inner rim (second ring) */
.filter-btn::after{
  content:none;
} 
  
 .filter-btn:active{
   transform: scale(var(--tap-scale-icon));
   /* ✅ press = simpler, less 3D */
   background: rgba(0,0,0,.08);
  box-shadow: var(--shadow-card-pressed);
 }

 @media (hover:hover){
  .filter-btn:hover{
    background: rgba(0,0,0,.06);
  }
}
  
 .filter-btn .icon{
   position: relative;
   z-index: 2;
   width:18px;
   height:18px;
   fill: currentColor;
   opacity:.9;
 }
  
 .filter-dropdown{
   position:absolute;
   top:52px;
   right:0;
   min-width:200px;
   padding:10px;
   border-radius:18px;
   /* 🔴 CHANGED: เพิ่ม contrast + ขอบ + แยกชั้นให้ชัด */
   background: rgba(255,255,255,.92);
   backdrop-filter: blur(26px) saturate(180%);
   -webkit-backdrop-filter: blur(26px) saturate(180%);
   border: 1px solid rgba(0,0,0,.08);
   box-shadow: var(--shadow-floating);
   color: rgba(17,17,17,.92);
   display:none;
   flex-direction:column;
   gap:6px;
 }

 .filter-dropdown.show{ display:flex; }

 .filter-item{
   /* 🔴 CHANGED: ทำให้แต่ละแถวอ่านง่าย + มี state */
   padding: 10px 12px;
   border-radius: 12px;
   font-size: 14px;
   font-weight: 600;
   color: rgba(17,17,17,.88);
   cursor: pointer;
   user-select: none;
   transition: background .16s ease, transform .16s ease;
 }

 /* 🔴 CHANGED: เส้นแบ่งแบบ iOS (ช่วยแยก item ไม่ให้กลืน) */
 .filter-item + .filter-item{
   border-top: 1px solid rgba(0,0,0,.06);
 }

 /* 🔴 CHANGED: hover/active ให้รู้ว่ากดได้ */
 @media (hover:hover){
   .filter-item:hover{
     background: rgba(0,0,0,.06);
   }
 }
 .filter-item:active{
   background: rgba(0,0,0,.10);
   transform: scale(.985);
 } 
  
/* ================= HEADER MENU BUTTON (iOS TACTILE) ================= */
.menu-btn{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  position: relative;
  overflow: hidden;

  /* ✅ Match filter-btn: Apple-nimble glass (less 3D) */
  background: rgba(255,255,255,.55);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);
  border: 1px solid rgba(255,255,255,.45);
  box-shadow: var(--shadow-control);

  color: rgba(17,17,17,.92); /* ✅ correct in light */
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:
    transform var(--dur-tap) var(--ease-tap),
    background var(--dur-tap) ease,
    box-shadow var(--dur-tap) ease;

  -webkit-tap-highlight-color: transparent;
}


/* ✅ Glass highlight (like filter) */
.menu-btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0;
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.95) 0%,
      rgba(255,255,255,.55) 26%,

/* ================= TOAST SYSTEM (GLOBAL FEEDBACK) ================= */

#toast-container {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 24px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 3000;

  flex-direction: column;
  gap: 8px;

  pointer-events: none; /* 🔒 ไม่บัง interaction */
}

  min-width: 260px;
  max-width: 90vw;
  padding: 12px 16px;

  border-radius: 14px;
  color: #fff;
  font-size: 14px;
  font-weight: 500;

  box-shadow: var(--shadow-float);              /* 🔴 ใช้ token เดียวกับระบบ */

  backdrop-filter: blur(18px) saturate(160%);   /* 🔴 เพิ่ม glass */
  -webkit-backdrop-filter: blur(18px) saturate(160%);

  animation: toast-slide-down .25s ease;
}

/* ===== Toast Variants ===== */
.toast.success { background: rgba(52,199,89,.92); }
.toast.error   { background: rgba(255,59,48,.92); }
.toast.warning { background: rgba(255,159,10,.92); }
.toast.info    { background: rgba(0,122,255,.92); }

/* ===== Animation (namespaced) ===== */
@keyframes toast-slide-down {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

<script>
/* ================= STEP 2: ประกาศ backdrop (UPGRADED) ================= */
const backdrop = document.getElementById("globalBackdrop");
const cartSheet = document.getElementById("cartSheet");
  
// ✅ SINGLE SOURCE OF TRUTH: sheet refs (กัน ReferenceError + กันพึ่ง global id)
const productSheet = document.getElementById("productSheet");
const qtySheet = document.getElementById("qtySheet");
const confirmSheet = document.getElementById("confirmSheet");
const stockSheet = document.getElementById("stockSheet");
const adminLoginSheet = document.getElementById("adminLoginSheet");
const adminDashboardSheet = document.getElementById("adminDashboardSheet");
const adminOrderSheet = document.getElementById("adminOrderSheet");
const adminStockSheet = document.getElementById("adminStockSheet");
const mainMenuSheet = document.getElementById("mainMenuSheet");
const adminProductActionSheet = document.getElementById("adminProductActionSheet");
const adminProductEditSheet = document.getElementById("adminProductEditSheet");
const adminStockActionSheet = document.getElementById("adminStockActionSheet");

// ✅ expose for inline onclick handlers (ปลอดภัยสุด)
Object.assign(window, {
  productSheet,
  qtySheet,
  confirmSheet,
  stockSheet,
  adminLoginSheet,
  adminDashboardSheet,
  adminOrderSheet,
  adminStockSheet,
  mainMenuSheet,
  adminProductActionSheet,
  adminProductEditSheet,
  adminStockActionSheet,
  adminAddProductSheet
});

// 🔒 Intent guards (STEP 2)
 let allowOpenOrders = false;
 let allowOpenStockTimeline = false;
 let allowOpenAddProduct = false;

  
/* ================= GLOBAL STATE (UPGRADED / SAFE) ================= */

const state = {
  mode: "viewer",

  viewerFilter: {
    status: "all"
  },

  // 🔴 CHANGED: เพิ่ม admin filter แยกจาก viewer (กันชน/กัน flow ปนกัน)
  adminFilter: {
    status: "all"
  },

  search: "",
  viewerSearchOpen: false,
  products: [],
  selectedProduct: null,
  qty: 1,
  cart: [],
  lastOrder: null,

  // 🔒 viewer submit guard (ใช้กับ createOrder)
  isSubmitting: false,

  admin: {
    loggedIn: false,
    user: null,
    token: null,
    orders: [],
    selectedOrder: null,
    logs: [],

    // 🔒 admin submit guard
    isSubmitting: false
  },

  // 🧠 SMART ADD PRODUCT DRAFT
  smartAddDraft: {
    price: "",
    stock: "",
    status: "ready",
    note: ""
  },

  ui: {
    overlayCount: 0,
    backdropLocked: false
  }
};

/* ================= CART STORAGE (VIEWER ONLY) ================= */

const CART_KEY = "luopanich_cart";

function saveCart() {
  try {
    localStorage.setItem(CART_KEY, JSON.stringify(state.cart));
  } catch (e) {
    console.warn("saveCart failed", e);
  }
}

function loadCart() {
  try {
    const raw = localStorage.getItem(CART_KEY);
    if (!raw) return;

    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      state.cart = parsed;
    }
  } catch (e) {
    console.warn("loadCart failed", e);
  }
}

function clearCartStorage() {
  localStorage.removeItem(CART_KEY);
}  
  
  /* ===== Feedback & Loading Utilities ===== */
function updateLoadingText(message){
  const text = document.getElementById("loading-text");
  if (text) {
    text.textContent = message;
  }
}

function showToast(message, type = 'info', timeout = 2500) {
  const container = document.getElementById('toast-container');
  if (!container) return;

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;

  container.appendChild(toast);

  // 🔒 limit toast count (optional but pro)
  if (container.children.length > 3) {
    container.removeChild(container.firstChild);
  }

  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, timeout);
}

// ---------- Central loading timer ----------
let _loadingTimer = null;
let _loadingShownAt = 0;
const MIN_LOADING_MS = 350; // กันกระพริบ

function showLoading(message, timeoutMs = 60000) {
  const overlay = document.getElementById("loading-overlay");
  const text = document.getElementById("loading-text");
  if (!overlay || !text) return;

  text.textContent = message;
  overlay.classList.remove("hidden");

  // บังคับ render
  overlay.offsetHeight;

  _loadingShownAt = Date.now();

  state.isSubmitting = true;
  state.ui.backdropLocked = true;
  if (backdrop) backdrop.style.display = "block";

  clearTimeout(_loadingTimer);
  _loadingTimer = setTimeout(() => {
    console.warn("[showLoading] auto-hide after timeout");
    safeHideLoading(true);
    showToast("การเชื่อมต่อล่าช้า ระบบยกเลิกแล้ว", "warning", 1800);
  }, timeoutMs);
}

/* ================= SAFE HIDE LOADING (SINGLE SOURCE OF TRUTH) ================= */
/**
 * ❗ IMPORTANT
 * - ต้องมี safeHideLoading แค่ตัวเดียวในระบบ
 * - ตัวนี้คือเวอร์ชันเดียวที่อนุญาตให้ใช้
 */

function safeHideLoading(fromTimeout = false) {
  const overlay = document.getElementById("loading-overlay");

  const elapsed = Date.now() - (_loadingShownAt || 0);
  const delay = Math.max(0, MIN_LOADING_MS - elapsed);

  setTimeout(() => {
    try {
      if (overlay) overlay.classList.add("hidden");

      // 🔥 หัวใจ: เคลียร์ timer ของ showLoading
      if (_loadingTimer) {
        clearTimeout(_loadingTimer);
        _loadingTimer = null;
      }

      state.isSubmitting = false;
      // 🔒 ปลด lock เฉพาะเมื่อไม่มี overlay เปิดอยู่ (กัน confirm/flow หลุด)
      if (state.ui.overlayCount === 0) {
        state.ui.backdropLocked = false;
      }

      if (state.ui.overlayCount === 0 && backdrop) {
        backdrop.style.display = "none";
      }

      console.log(
        "[safeHideLoading] loading closed",
        fromTimeout ? "(timeout)" : ""
      );

    } catch (e) {
      console.error("[safeHideLoading] failed", e);
    }
  }, delay);
}


// ---------- fetchWithTimeout ----------
async function fetchWithTimeout(input, init = {}, ms = 30000) {
  const controller = new AbortController();
  const signal = controller.signal;
  const id = setTimeout(() => controller.abort(), ms);

  try {
    const res = await fetch(input, { ...init, signal });

    // 🔒 เช็ค HTTP status ชัดเจน
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}: ${text}`);
    }

    return res;

  } catch (err) {
    if (err.name === "AbortError") {
      throw new Error("การเชื่อมต่อช้าเกินไป กรุณาลองใหม่อีกครั้ง");
    }
    throw err;
  } finally {
    clearTimeout(id);
  }
}
  

/* ================= API LAYER ================= */
const API_URL="https://script.google.com/macros/s/AKfycbzs0OLbJ7oa8WQxIXWYcx4X3NqfS3sCIaq9iV6Mh8oLWOqI9k71Qhei08zL2fbR2Eo/exec";

const fetchProducts = async () => {
  const res = await fetchWithTimeout(
   `${API_URL}?action=products`,
   {},
   15000
 );
  const json = await res.json();

  // 🔒 enforce standard response
  if (!json || json.success !== true || !Array.isArray(json.data)) {
    console.error("fetchProducts invalid response:", json);
    return []; // ✅ คืน array เสมอ
  }

  return json.data;
};

const fetchAdminProducts = async () => {
  if (!state.admin?.token) {
    throw new Error("Not authenticated");
  }

  const form = new URLSearchParams();
  form.append("action", "adminProducts");
  form.append("token", state.admin.token);

  const res = await fetchWithTimeout(
    API_URL,
    {
      method: "POST",
      body: form
    },
    15000
  );

  const json = await res.json();
  if (!json || json.success !== true || !Array.isArray(json.data)) {
    throw new Error(json?.error || "โหลดสินค้าแอดมินไม่สำเร็จ");
  }

  return json.data;
};  

function sortProducts(products) {
  if (!Array.isArray(products)) return [];

  return products.sort((a, b) =>
    String(a.productId || "").localeCompare(
      String(b.productId || ""),
      'th',
      {
        numeric: true,
        sensitivity: 'base'
      }
    )
  );
}
  
async function refreshProducts() {
  const app = document.getElementById("app");

  // ✅ Premium Skeleton เฉพาะตอน "ยังไม่มีรายการ" (ลดอาการวูบ/กระพริบ)
  if (app && (!Array.isArray(state.products) || state.products.length === 0)) {
    const skeleton = Array.from({ length: 6 }).map(() => `
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton-row">
          <div class="skeleton-thumb"></div>
          <div class="skeleton-lines">
            <div class="skeleton-line w70"></div>
            <div class="skeleton-line w45"></div>
            <div class="skeleton-line w30"></div>
          </div>
        </div>
      </div>
    `).join("");
    app.innerHTML = `<div class="skeleton-list">${skeleton}</div>`;
  }

  try {
    const list = state.mode === "admin"
      ? await fetchAdminProducts()
      : await fetchProducts();
    state.products = sortProducts(list);
    renderProducts();
  } catch (err) {
    console.error("refreshProducts failed:", err);
    if (app) {
      app.innerHTML = `
        <div style="
          text-align:center;
          color:#d93025;
          margin-top:40px;
          font-size:15px;
        ">
          ไม่สามารถโหลดรายการสินค้าได้
        </div>
      `;
    }
  }
}

async function createOrder() {
  // 🔴 HARDENING: reload stock snapshot before submit
  const latestProducts = await fetchProducts();

  for (const item of state.cart) {
    const product = latestProducts.find(
      p => p.productId === item.productId
    );

    if (!product) {
      throw new Error(`ไม่พบสินค้า ${item.name}`);
    }

    if (Number(product.stock) < Number(item.qty)) {
      throw new Error(
        `${item.name} คงเหลือ ${product.stock} ชิ้น (คุณเลือก ${item.qty})`
      );
    }
  }

  const total = state.cart.reduce(
   (s,i)=> s + Number(i.price) * Number(i.qty),
   0
 );

  const form = new URLSearchParams();
  form.append("action", "createOrder");
  form.append("items", JSON.stringify(state.cart));
  form.append("total", total);

  // ใช้ fetchWithTimeout เพื่อป้องกัน request แขวน
  const res = await fetchWithTimeout(API_URL, {
    method: "POST",
    body: form
  }, 15000);

  // 🔴 FIX: เช็ค HTTP status ก่อน
  if (!res.ok) {
    const text = await res.text();
    throw new Error(
      `CreateOrder HTTP ${res.status}: ${text}`
    );
  }

  const json = await res.json();

  // 🔴 FIX: validate response shape
  if (!json || json.success !== true || !json.data?.orderId) {
    throw new Error("Invalid createOrder response");
  }

  return json;
}

function openOverlay(el){
  if (!el || el.classList.contains("show")) return;

  el.classList.add("show");
  state.ui.overlayCount++;

  backdrop.style.display = "block";
}

function closeOverlay(el){
  if (!el || !el.classList.contains("show")) return;

  el.classList.remove("show");
  state.ui.overlayCount = Math.max(0, state.ui.overlayCount - 1);

  // 🔴 CHANGED: จำว่าเราปิด "cartSheet" อยู่ไหม (เพราะบางครั้งปิดผ่าน backdrop จะไม่เรียก closeCart)
  const closedCartSheet = (el.id === "cartSheet");

  if (state.ui.overlayCount === 0 && !state.ui.backdropLocked) {
    backdrop.style.display = "none";

    // 🔴 FIX: reset floating bar momentum state
    const bar = document.getElementById("floatingBar");
    if (bar) bar.classList.remove("scroll-hide");

    // 🔴 CHANGED: ถ้าเพิ่งปิด cartSheet และกลับสู่ viewer จริง → ต้องคืน floatingBar ถ้า cart ยังมีของ
    // ใช้ rAF เพื่อให้ DOM/overlayCount settle ก่อน (กันเคสปิดแล้ว bar ไม่กลับ)
    if (closedCartSheet && typeof renderFloatingBar === "function") {
      requestAnimationFrame(() => {
        // กันเคส user เปิด overlay อื่นทันทีระหว่างเฟรม
        if (state.mode === "viewer" && state.ui.overlayCount === 0) {
          renderFloatingBar();
        }
      });
    }

async function checkStockBeforeSubmit() {
  const latestProducts = await fetchProducts();

  for (const item of state.cart) {
    const product = latestProducts.find(
      p => p.productId === item.productId
    );

    if (!product) {
      return { ok:false, message:`ไม่พบสินค้า ${item.name}` };
    }

    if (Number(product.stock) < Number(item.qty)) {
      return {
        ok:false,
        message:`${item.name} คงเหลือ ${product.stock} ชิ้น (คุณเลือก ${item.qty})`
      };
    }
  }

  return { ok:true };
}

// 🔒 Global HTML Escape (XSS Guard) — micro polish: escape &, <, >, ", '
 const esc = (s) =>
   String(s ?? "")
     .replace(/&/g, "&amp;")
     .replace(/</g, "&lt;")
     .replace(/>/g, "&gt;")
     .replace(/"/g, "&quot;")
     .replace(/'/g, "&#39;");

 // 🔒 Attribute-safe (สำหรับ src/alt/href)
 const escAttr = (s) => esc(s);

function renderFloatingBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) return;

  // show เฉพาะ viewer + มีของในตะกร้า
  const hasItems = Array.isArray(state.cart) && state.cart.length > 0;
   const isViewer = state.mode === "viewer";

  // ✅ FIX: กัน ReferenceError ถ้าไม่มีตัวแปร cartSheet (หาจาก DOM โดยตรง)
  const cartSheetEl = document.getElementById("cartSheet");
  const cartOpen = !!(cartSheetEl && cartSheetEl.classList.contains("show"));

  if (!isViewer || !hasItems || cartOpen) {
    bar.classList.remove("show","bounce-in");
    bar.innerHTML = "";
    return;
  }

  const total = state.cart.reduce((s,i)=> s + (Number(i.price)||0) * (Number(i.qty)||0), 0);
  const money = (n) => (Number(n)||0).toLocaleString("th-TH");

  // ✅ แสดงเป็น "รายการ" (ชื่อสินค้าแบบย่อ) ไม่โชว์จำนวน
  const names = state.cart
    .map(i => String(i.name || "").trim())
    .filter(Boolean);
  const uniqueNames = [...new Set(names)];
  const itemCount = uniqueNames.length; // ✅ จำนวน "รายการ" (distinct) เช่น qty=3 ก็ยัง = 1 รายการ
  const preview = uniqueNames.slice(0, 2).join(", ");

  const listText = itemCount

    : "0 รายการ";

function toggleViewerSearch(){
  const wrap  = document.getElementById("viewerSearchWrap");
  const input = document.getElementById("viewerSearchInput");
  if(!wrap || !input) return;

  const opened = wrap.classList.contains("active");

  if(opened){
    input.value = "";
    state.search = "";
    state.viewerSearchOpen = false;
    renderProducts();
    wrap.classList.remove("active");
  }else{
    state.viewerSearchOpen = true;
    wrap.classList.add("active");
    setTimeout(()=>input.focus(),80);
  }
}

function toggleAdminSearch(){

  if (opening) {
    const input = wrap.querySelector("input");

function toggleFilterDropdown(){
  const el = document.getElementById("filterDropdown");
  if(!el) return;

  const isOpen = el.classList.contains("show");

  document.querySelectorAll(".filter-dropdown.show")
    .forEach(d => d.classList.remove("show"));

  if(!isOpen){

function isLoginRateLimited() {
  return false;

async function handleAdminLogin(btn){
  // 🔒 กันกดซ้ำ
  if (state.isSubmitting) return;

  // 🔒 force global rate limit (scope-safe)
  if (typeof window.isLoginRateLimited === "function") {
    if (window.isLoginRateLimited()) {
      alert("พยายามเข้าสู่ระบบบ่อยเกินไป กรุณารอสักครู่");
      return;
    }
  }

  const userInput = document.getElementById("adminUser");
  const passInput = document.getElementById("adminPass");
  const cancelBtn = document.getElementById("adminCancelBtn");

  const username = userInput.value.trim();
  const password = passInput.value;

  if (!username || !password) {
    alert("กรุณากรอก Username และ Password");
    return;
  }

  // ================= UX START =================
  state.isSubmitting = true;

  if (btn) {
    btn.disabled = true;
    btn.textContent = "กำลังเข้าสู่ระบบ...";
  }
  if (cancelBtn) cancelBtn.disabled = true;

  showLoading("กำลังเข้าสู่ระบบแอดมิน...");
  // ================= UX END ===================

  try {
    // 🔐 CALL BACKEND LOGIN
    const form = new URLSearchParams();
    form.append("action", "adminLogin");
    form.append("username", username);
    form.append("password", password);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (!json.success || !json.token) {
      throw new Error(json.error || json.message || "Login failed");
    }

    // ✅ SAVE SESSION (STATE)
    state.admin.loggedIn = true;
    state.admin.user = json.username;
    state.admin.token = json.token;
    state.admin.expiredAt = json.expiredAt;

    // ✅ SAVE SESSION (PERSIST)
    saveAdminSession(json);

    // 🧹 CLOSE LOGIN SHEET
    closeOverlay(adminLoginSheet);

    // 🔓 reset lock เผื่อมีค้าง
    state.ui.backdropLocked = false;

    // 🚀 ENTER ADMIN MODE
    enterAdmin();

  } catch (err) {
    console.error(err);
    alert(err.message || "ไม่สามารถเข้าสู่ระบบได้");

  } finally {
    // ================= CLEANUP =================
    safeHideLoading();
    state.isSubmitting = false;

    if (btn) {
      btn.disabled = false;
      btn.textContent = "Login";
    }
    if (cancelBtn) cancelBtn.disabled = false;
  }
}

            `).join("")
          : `

          `
      }
    `;
  } catch (err) {
    console.error(err);

    // 🔴 ถ้าเป็น session error → ออกทันที
    if (
      err.message?.includes("Session") ||
      err.message?.includes("token")
    ) {
      alert("Session หมดอายุ กรุณา login ใหม่");
      exitAdmin();
      return;
    }

    adminDashboardSheet.innerHTML = `
      <h3>Orders</h3>

      <div style="text-align:center;color:#d93025;margin-top:32px">
        ไม่สามารถโหลดรายการออเดอร์ได้

        style="width:100%;margin-top:8px"
        onclick="finishAdminAction({ refresh:false })">

    `;
  }

async function openStockTimeline(force = false) {
  // ❌ ต้องมี intent จริง
  if (!force && !allowOpenStockTimeline) return;

  // 🔐 session guard
  if (
    !state.admin.loggedIn ||
    !state.admin.token ||
    isAdminSessionExpired()
  ) {
    alert("Session หมดอายุ กรุณา login ใหม่");
    exitAdmin();
    return;
  }

  // 🔒 ใช้แล้วปิดทันที (กันเด้งซ้ำ)
  allowOpenStockTimeline = false;

  closeOverlay(adminDashboardSheet);

  adminStockSheet.innerHTML = `
    <h3>📦 ประวัติความเคลื่อนไหวสต๊อก</h3>
    <div class="loading">กำลังโหลด...</div>
  `;

  openOverlay(adminStockSheet);

  try {
    const logsRes = await fetchStockLogs();
    const logs = Array.isArray(logsRes?.data) ? logsRes.data : [];

    /* ================= GROUP ORDER OUT ================= */
    const orderMap = {};
    const singles = [];

    logs.forEach(l => {
  const time = l.timestamp ? new Date(l.timestamp) : new Date();

  // ✅ ใช้ orderId จริงจาก sheet (fallback เผื่อของเก่า)
  const orderRef = l.orderId || l.ref || null;

  if (l.type === "OUT" && orderRef) {
    if (!orderMap[orderRef]) {
      orderMap[orderRef] = {
        orderId: orderRef,
        time,
        by: l.by || "-",
        items: []
      };
    }

    orderMap[orderRef].items.push({
      productId: l.productId,
      qty: Math.abs(Number(l.qty || 0)),
      before: l.before,
      after: l.after
    });
  } else {
    singles.push({
      ...l,
      _time: time
    });
  }
});

    /* ================= BUILD TIMELINE ================= */
    const timeline = [];

    Object.values(orderMap).forEach(o => {
      timeline.push({
        kind: "ORDER",
        type: "OUT",
        orderId: o.orderId,
        time: o.time,
        by: o.by,
        items: o.items
      });
    });

    singles.forEach(l => {
      timeline.push({
        kind: "STOCK",
        type: l.type,
        productId: l.productId,
        qty: l.qty,
        before: l.before,
        after: l.after,
        time: l._time,
        by: l.by || "-"
      });
    });

    // 🕒 latest first (safe)
    timeline.sort((a, b) => b.time.getTime() - a.time.getTime());

    /* ================= RENDER ================= */
    adminStockSheet.innerHTML = `
      <h3>📦 ประวัติความเคลื่อนไหวสต๊อก</h3>

      <button class="btn btn-secondary"
        style="width:100%;margin-bottom:12px"
        onclick="finishAdminAction({ refresh:false })">
        ← กลับ
      </button>

      ${
        timeline.length
          ? timeline.map(t => {

              if (t.kind === "ORDER") {
                return `
                  <div class="card">
                    <div class="timeline-tag tag-out">
                      🧾 ขายออก (ออเดอร์ ${t.orderId})
                    </div>

                    ${t.items.map(i => `
                      <div style="font-size:14px;line-height:1.5">
                        ${i.productId} x ${i.qty}
                        ${
                          Number.isFinite(i.before)
                            ? `<span style="color:#888">
                                (${i.before} → ${i.after})
                              </span>`
                            : ""
                        }
                      </div>
                    `).join("")}

                    <div style="font-size:12px;color:#888;margin-top:6px">
                      ${t.time.toLocaleDateString("th-TH")}
                      ${t.time.toLocaleTimeString("th-TH")}
                      · โดย ${t.by}
                    </div>
                  </div>
                `;
              }

              const typeMap = {
                IN:     { text: "➕ รับสต๊อกเข้า", class: "tag-in" },
                CREATE: { text: "🆕 เพิ่มสินค้าใหม่", class: "tag-create" },
                ADJUST: { text: "✏️ ปรับสต๊อก", class: "tag-adjust" }
              };

              const cfg = typeMap[t.type] || { text: t.type, class: "" };

              return `
                <div class="card">
                  <div class="timeline-tag ${cfg.class}">
                    ${cfg.text}
                  </div>

                  <div style="font-size:14px">
                    ${t.productId}
                    ${
                      Number.isFinite(t.before)
                        ? ` (${t.before} → ${t.after})`
                        : ""
                    }
                  </div>

                  <div style="font-size:12px;color:#888;margin-top:6px">
                    ${t.time.toLocaleDateString("th-TH")}
                    ${t.time.toLocaleTimeString("th-TH")}
                    · โดย ${t.by}
                  </div>
                </div>
              `;
            }).join("")
          : `
            <div style="text-align:center;color:#888;margin-top:32px">
              ไม่มีข้อมูลประวัติสต๊อก
            </div>
          `
      }
    `;

  } catch (err) {
    console.error(err);

    adminStockSheet.innerHTML = `
      <h3>📦 ประวัติความเคลื่อนไหวสต๊อก</h3>
      <div style="text-align:center;color:#d93025;margin-top:32px">
        ไม่สามารถโหลดข้อมูลได้
      </div>
    `;
  }
}

async function submitStockIn(){
  // 🔒 guard
  if (state.mode !== "admin" || !state.selectedProduct) {
    alert("Unauthorized");
    return;
  }

  const qtyInput    = document.getElementById("stockQty");
  const reasonInput = document.getElementById("stockReason");

  const qty    = Number(qtyInput.value);
  const reason = reasonInput.value.trim();

  // 🔍 validate
  if (!Number.isInteger(qty) || qty <= 0) {
    alert("จำนวนไม่ถูกต้อง");
    qtyInput.focus();
    return;
  }

  // 🔒 disable ปุ่มกันกดซ้ำ
  const buttons = adminStockActionSheet.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);

  try {
    const res = await adminStockIn(
      state.selectedProduct.productId,
      qty,
      reason
    );

    if (res.error) {
      throw new Error(res.error);
    }

    alert("รับสต๊อกเข้าแล้ว");

    // 🔄 refresh สินค้า
    await refreshProducts();

    // 🧹 reset input
    qtyInput.value = "";
    reasonInput.value = "";

    // ✅ ปิด Stock Action ผ่าน Overlay Manager
    closeOverlay(adminStockActionSheet);

    // ✅ กลับสู่หน้าแม่ของ admin แบบนิ่ง
    finishAdminAction({ refresh: true });

  } catch (err) {
    console.error(err);
    alert(err.message || "ไม่สามารถรับสต๊อกได้");
  } finally {
    // 🔓 เปิดปุ่มกลับทุกกรณี
    buttons.forEach(b => b.disabled = false);
  }
}

  reader.readAsDataURL(file);

async function submitOrder(){
  // ❌ ห้ามใช้ state.loading เป็น guard
  if (state.isSubmitting || state.cart.length === 0) return;

  state.isSubmitting = true;
  state.ui.backdropLocked = true;

  try {
    // ================= STEP 1: CHECK STOCK =================
    showLoading('กำลังตรวจสอบสต๊อก...');
    const stockCheck = await checkStockBeforeSubmit();

    if (!stockCheck.ok) {
      showToast(stockCheck.message, 'warning');
      throw new Error("STOCK_CHECK_FAILED");
    }

    // ================= STEP 2: CREATE ORDER =================
    updateLoadingText('กำลังสร้างใบสั่งซื้อ...');
    const res = await createOrder();

    if (!res || res.success !== true || !res.data?.orderId) {
      throw new Error("Invalid order response");
    }

    // ================= SUCCESS =================
    state.lastOrder = {
      orderId: res.data.orderId,
      items: JSON.parse(JSON.stringify(state.cart)),
      total: state.cart.reduce(
        (s,i)=> s + Number(i.price) * Number(i.qty),
        0
      ),
 createdAt: new Date(),

async function uploadProductImage(file) {
  return new Promise((resolve, reject) => {
    // 🔒 guard token
    if (!state.admin || !state.admin.token) {
      reject("Missing admin token");
      return;
    }

    const reader = new FileReader();

    reader.onload = async () => {
      try {
        // 🔹 ตัด data:image/...;base64,
        const base64 = reader.result.split(",")[1];

        // ✅ ใช้ FormData
        const formData = new FormData();
        formData.append("action", "uploadProductImage"); // ✅ สำคัญ (ที่ขาดอยู่)
        formData.append("token", state.admin.token);
        formData.append("filename", file.name);
        formData.append("mimeType", file.type || "image/jpeg");
        formData.append("data", base64);

        const res = await fetch(API_URL, {
          method: "POST",
          body: formData
        });

        const json = await res.json();

        // 🔒 backend wrap data ไว้ใน data
        if (!json.success || !json.data || !json.data.imageUrl) {
          reject(json.error || json.message || "Upload failed");
          return;
        }

        // ✅ สำเร็จ
        resolve(json.data.imageUrl);

      } catch (err) {
        reject(err);
      }
    };

    reader.onerror = () => {
      reject("File read error");
    };

    reader.readAsDataURL(file);
  });
}
  
async function submitProductEdit(){
  // 🔒 GUARD: กันกดซ้ำ
  if (state.isSubmitting) return;

  const p = state.selectedProduct;
  if (!p) return;

  state.isSubmitting = true;

  // 🔒 LOCK BUTTON
  const saveBtn = adminProductEditSheet.querySelector(".btn-primary");
  const originalText = saveBtn?.textContent;
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = "กำลังบันทึก...";
  }

  const name   = document.getElementById("editName").value.trim();
  const price  = Number(document.getElementById("editPrice").value);
  const costPrice = Number(document.getElementById("editCostPrice").value);
  const stock  = Number(document.getElementById("editStock").value);
  const status = document.getElementById("editStatus").value;
  const newProductId = document.getElementById("editProductId").value.trim();
  const oldProductId = p.productId;
  const note   = document.getElementById("editNote")?.value.trim() || "";
  const detailsText =
  document.getElementById("editDetailsText")?.value.trim() || "";

 const compareImages =
   Array.isArray(state.compareImagesDraft)
     ? state.compareImagesDraft.join(",")
     : "";

  // 🔒 Validate
  if (
   !name ||
   !newProductId ||
   !Number.isFinite(price) ||
   !Number.isFinite(costPrice) ||
   !Number.isFinite(stock) ||
   price < 0 ||
   costPrice < 0 || 
   stock < 0
 ) {
    showToast("ข้อมูลไม่ถูกต้อง", "error");

    // 🔓 คืนสภาพทันที
    state.isSubmitting = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

  // 🔒 SKU Duplicate Check (วางตรงนี้เท่านั้น)
  const duplicate = state.products.find(
    x => x.productId === newProductId && x.productId !== oldProductId
  );
 
  if (duplicate) {
    showToast("รหัสสินค้านี้มีอยู่แล้ว", "error");
    state.isSubmitting = false;
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
    return;
  }

  let imageUrl = p.image || "";

  try {
    showLoading("กำลังบันทึกการแก้ไขสินค้า...");

    // ถ้ามีการเลือกภาพใหม่ → upload ก่อน
    if (state.editImageFile) {
      imageUrl = await uploadProductImage(state.editImageFile);
      if (!imageUrl) {
        throw new Error("ไม่สามารถอัปโหลดรูปได้");
      }
    }

    // Update product
    const form = new URLSearchParams();
    form.append("action", "updateProduct");
    form.append("token", state.admin.token);
    form.append("oldProductId", oldProductId);
    form.append("newProductId", newProductId);
    form.append("name", name);
    form.append("price", price);
    form.append("costPrice", costPrice);
    form.append("stock", stock);
    form.append("status", status);
    form.append("image", imageUrl);
    form.append("note", note);
    form.append("detailsText", detailsText);
    form.append("compareImages", compareImages);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    }).then(r => r.json());

    if (res.error || res.success === false) {
      throw new Error(res.message || res.error || "บันทึกไม่สำเร็จ");
    }

    showToast("บันทึกการแก้ไขเรียบร้อย", "success");

    state.selectedProduct = null;

    // cleanup
    state.editImageFile = null;
    closeProductEdit();
    await refreshProducts();

  } catch (err) {
    console.error(err);
    showToast(
      err.message || "เกิดข้อผิดพลาดในการบันทึกสินค้า",
      "error"
    );

  } finally {
    // ✅ CLEANUP กลางเดียว (หัวใจ STEP 9)
    safeHideLoading();
    state.isSubmitting = false;

    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
  }
}

async function submitAddProduct(btn){

  if(btn){

  try {
    // 🔔 UX: แจ้งเริ่มกระบวนการ
    showLoading("กำลังตรวจสอบข้อมูลสินค้า...");
    const productId = document.getElementById("addProductId").value.trim();
    const name      = document.getElementById("addName").value.trim();
    const price     = Number(document.getElementById("addPrice").value);
    const costPrice = Number(document.getElementById("addCostPrice").value);
    const stock     = Number(document.getElementById("addStock").value);
 let status      = document.getElementById("addStatus").value;
 const note      = document.getElementById("addNote")?.value.trim() || "";
 const continueMode =
   document.getElementById("addContinueMode")?.checked === true;   
 const active    = true; // 🔒 เพิ่มสินค้าใหม่ = ยังขายอยู่เสมอ

    /* ================= VALIDATE ================= */

    if (!productId) {
      document.getElementById("addProductId").focus();

    }

    if (!name) {
      document.getElementById("addName").focus();

    if (!Number.isInteger(price) || !Number.isInteger(costPrice) || !Number.isInteger(stock)) {

/* =========================================================
   🔤 THAI BAHT TEXT CONVERTER
========================================================= */
function numberToThaiText(num) {
  if (isNaN(num)) return "";

  const digit = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
  const position = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];

  function convert(n) {
    let result = "";
    const str = parseInt(n, 10).toString();
    const len = str.length;

    for (let i = 0; i < len; i++) {
      const d = parseInt(str.charAt(i));
      const pos = len - i - 1;

      if (d === 0) continue;

      if (pos === 0 && d === 1 && len > 1) {
        result += "เอ็ด";
      } else if (pos === 1 && d === 2) {
        result += "ยี่";
      } else if (pos === 1 && d === 1) {
        result += "";
      } else {
        result += digit[d];
      }

      result += position[pos];
    }

    return result;
  }

  if (num === 0) return "ศูนย์บาทถ้วน";

  return convert(num) + "บาทถ้วน";
}

function exportOrderPNG() {
  const order = state.lastOrder;
  if (!order) return;

  /* ================= A4 CONFIG (FIXED) ================= */
  const cfg = {
    width: 794,          // A4 width @96dpi
    height: 1123,        // 🔥 A4 height fixed
    padding: 64,
    titleSize: 32,
    textSize: 18,
    lineHeight: 34
  };
  /* ================= CANVAS SIZE ================= */
  const items = Array.isArray(order.items) ? order.items : [];

  const po = order.poNumber
    ? String(order.poNumber)
    : "-";

  const canvas = document.createElement("canvas");
  canvas.width = cfg.width;
  canvas.height = cfg.height;  // 🔥 FIXED A4

  const ctx = canvas.getContext("2d");

  /* ================= BACKGROUND ================= */
  ctx.fillStyle = "#f2f2f7";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

/* ================= CARD ================= */
  ctx.fillStyle = "#ffffff";

  // ✅ Canvas shadow uses token (sync light/dark)
  const getToken = (name) =>
    getComputedStyle(document.documentElement)
      .getPropertyValue(name)
      .trim();

  const parseShadowToken = (v) => {
    // expects: "0 10px 30px rgba(0,0,0,.08)" (single shadow)
    const m = String(v).match(
      /^\s*(-?\d+(?:\.\d+)?)px?\s+(-?\d+(?:\.\d+)?)px?\s+(\d+(?:\.\d+)?)px?\s+(.+)\s*$/i
    );
    if (!m) return null;
    return {
      x: Number(m[1]) || 0,
      y: Number(m[2]) || 0,
      blur: Number(m[3]) || 0,
      color: (m[4] || "rgba(0,0,0,.08)").trim()
    };
  };

  let canvasShadowRaw =
    getToken("--shadow-canvas-card") || getToken("--shadow-card");

  // ✅ resolve var(--shadow-*) for custom properties (Safari/Chrome may return literal "var(...)")
  const varMatch = String(canvasShadowRaw).match(/var\((--[^)]+)\)/);
  if (varMatch && varMatch[1]) {
    canvasShadowRaw = getToken(varMatch[1]) || canvasShadowRaw;
  }
  const sh = parseShadowToken(canvasShadowRaw);
  if (sh) {
    ctx.shadowColor = sh.color;
    ctx.shadowBlur = sh.blur;
    ctx.shadowOffsetX = sh.x;
    ctx.shadowOffsetY = sh.y;
  } else {
    // fallback (should rarely happen)
    ctx.shadowColor = "rgba(0,0,0,0.08)";
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 6;
  }

  ctx.beginPath();

  if (typeof ctx.roundRect === "function") {
    ctx.roundRect(8, 8, canvas.width - 16, canvas.height - 16, 18);
  } else {
    const x = 8;
    const y0 = 8;
    const w = canvas.width - 16;
    const h = canvas.height - 16;
    const r = 18;

    ctx.moveTo(x + r, y0);
    ctx.lineTo(x + w - r, y0);
    ctx.quadraticCurveTo(x + w, y0, x + w, y0 + r);
    ctx.lineTo(x + w, y0 + h - r);
    ctx.quadraticCurveTo(x + w, y0 + h, x + w - r, y0 + h);
    ctx.lineTo(x + r, y0 + h);
    ctx.quadraticCurveTo(x, y0 + h, x, y0 + h - r);
    ctx.lineTo(x, y0 + r);
    ctx.quadraticCurveTo(x, y0, x + r, y0);
  }

  ctx.fill();
  ctx.shadowColor = "transparent";

  /* ================= TEXT ================= */
  let y = cfg.padding + cfg.lineHeight;
  ctx.fillStyle = "#000";

  /* ===== TITLE ===== */
  ctx.font = `700 ${cfg.titleSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillText("ใบสั่งซื้อ", cfg.padding, y);
  y += cfg.lineHeight + 8;

  /* ===== HEADER BASE LINE ===== */
  const headerTopY = y;

  /* ===== COMPANY BLOCK ===== */
ctx.font = `700 ${cfg.textSize + 4}px -apple-system`;
ctx.fillText("ร้านล้อพาณิชย์", cfg.padding, headerTopY);

ctx.fillText(
   "7/13 หมู่ 5",
   cfg.padding,
   headerTopY + cfg.lineHeight
 );
 ctx.fillText(
   "ต.หนองแขม อ.หนองแค",
   cfg.padding,
   headerTopY + cfg.lineHeight * 2
 );
 ctx.fillText(
   "จ.สระบุรี 18140",
   cfg.padding,
   headerTopY + cfg.lineHeight * 3
 );

/* ===== DOCUMENT META ===== */
const rightX = canvas.width - cfg.padding;

  ctx.textAlign = "right";
  ctx.fillText(`เลขที่: ${order.orderId}`, rightX, headerTopY);
 ctx.fillText(`PO: ${po}`, rightX, headerTopY + cfg.lineHeight);
 const docDate = new Date(order.createdAt);
 ctx.fillText(
   `วันที่: ${docDate.toLocaleDateString("th-TH")}`,
   rightX,
   headerTopY + cfg.lineHeight * 2
 );

  ctx.textAlign = "left";
  y = headerTopY + cfg.lineHeight * 5;


  /* ===== DIVIDER ===== */
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

/* ================= ITEMS (GRID TABLE) ================= */
  const tableTopY = y;
  const rowHeight = 42;

  const col = {
    no: cfg.padding,
    name: cfg.padding + 60,
    qty: canvas.width - cfg.padding - 260,
    price: canvas.width - cfg.padding - 180,
    total: canvas.width - cfg.padding - 90
  };

  ctx.font = `700 ${cfg.textSize}px -apple-system`;

  // HEADER
  ctx.fillText("ลำดับ", col.no, y);
  ctx.fillText("รายการสินค้า", col.name, y);
  ctx.fillText("จำนวน", col.qty, y);
  ctx.fillText("ราคา", col.price, y);
  ctx.fillText("รวม", col.total, y);

  y += 16;

  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();

  y += rowHeight - 16;

  ctx.font = `${cfg.textSize}px -apple-system`;

  items.forEach((i, index) => {
    const total = Number(i.price) * Number(i.qty);

    ctx.fillText(String(index + 1), col.no, y);

    ctx.fillText(`฿${total.toLocaleString()}`, col.total + 80, y);
    ctx.textAlign = "left";

    // horizontal line
    ctx.beginPath();
    ctx.moveTo(cfg.padding, y + 16);
    ctx.lineTo(canvas.width - cfg.padding, y + 16);
    ctx.strokeStyle = "#ddd";
    ctx.stroke();

    y += rowHeight;
  });
  
  /* ===== DIVIDER ===== */
  y += 4;
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();
  y += cfg.lineHeight;

  /* ================= TOTAL ================= */
  ctx.font = `700 ${cfg.textSize + 4}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const safeTotal = Number(order.total) || 0;
  const totalText = `ยอดรวม: ฿${safeTotal.toLocaleString()}`;
  const tw = ctx.measureText(totalText).width;
  ctx.fillText(
    totalText,
    canvas.width - cfg.padding - tw,

  );

  /* ===== THAI TEXT TOTAL ===== */
  y += cfg.lineHeight;
  ctx.font = `${cfg.textSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  const thaiText = `(${numberToThaiText(safeTotal)})`;
  const thaiWidth = ctx.measureText(thaiText).width;
  ctx.fillText(

  /* ================= DOWNLOAD (FIXED) ================= */
  const a = document.createElement("a");

async function restoreAdminSessionIfValid() {
  const restored = loadAdminSession();
  if (!restored?.token || !restored?.expiredAt) return false;

  // expired guard
  if (Date.now() > new Date(restored.expiredAt).getTime()) {
    clearAdminSession();
    return false;
  }

  try {
    // ✅ lightweight validate (POST ให้ตรง backend)
    const form = new URLSearchParams();
    form.append("action", "orders");
    form.append("token", restored.token);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (json?.success === true) {
      state.admin.loggedIn = true;
      state.admin.user = restored.username || null;
      state.admin.token = restored.token;
      state.admin.expiredAt = restored.expiredAt;

 function handleHeaderScroll(){

   const currentY = Math.max(0, window.scrollY); // 🔴 FIX: clamp negative scroll (iOS bounce)

   const delta = currentY - (_lastScrollY ?? currentY);
   const deltaTime = (now - (_lastScrollTime ?? now)) || 16;      // 🔴 NEW
   const velocity = delta / deltaTime;                 // 🔴 NEW

// 🔴 CHANGED: micro scroll noise guard (แต่ต้อง "โชว์ bar คืน" เมื่อหยุดเลื่อน)
   if (Math.abs(delta) < 1) {

     // ยกเว้นกรณีอยู่บนสุดจริง ๆ ค่อยบังคับให้โชว์

   } 
   
if (header){

      header.classList.add("scrolled");

      header.classList.remove("scrolled");

  }
   
  /* ================= BACK TO TOP SHOW/HIDE ================= */

    /* ================= FLOATING BAR SMART HIDE ================= */
   if (bar && bar.classList.contains("show")) {
     // 📍 อยู่บนสุด → แสดงเสมอ
     if (currentY <= 10) {
       bar.classList.remove("scroll-hide");
     }
     // 🔴 CHANGED: direction-based
    else if (delta > 0) {
       // ⬇️ เลื่อนลง = ซ่อน (กันบังเวลาเลือกสินค้าเพิ่ม)
       bar.classList.add("scroll-hide");
     }
    else if (delta < 0) {
       // ⬆️ เลื่อนขึ้น = โชว์
       bar.classList.remove("scroll-hide");
     }
   }
   
   _lastScrollY = currentY;
   _lastScrollTime = now; // 🔴 NEW
   _headerTicking = false;
 }

 window.addEventListener("scroll", () => {

 // 🔴 ADD: Smart hide เมื่อ scroll ภายใน .sheet (เพราะ window.scrollY ไม่เปลี่ยน)
(function bindSheetScrollSmartHide(){
  const lastTop = new WeakMap(); // เก็บ scrollTop ล่าสุดของแต่ละ sheet

  document.addEventListener("scroll", (e) => {
    const t = e.target;
    if (!t) return;
    const sheetEl = (t.closest && t.closest(".sheet")) || (t.classList && t.classList.contains("sheet") ? t : null);
    if (!sheetEl) return;

    const bar = document.getElementById("floatingBar");
    if (!bar || !bar.classList.contains("show")) return;

   const prev = lastTop.get(sheetEl) ?? sheetEl.scrollTop;
    const d = sheetEl.scrollTop - prev;
    lastTop.set(sheetEl, sheetEl.scrollTop);

    if (Math.abs(d) < 1) return;
    if (d > 2) bar.classList.add("scroll-hide");        // ⬇️ เลื่อนลงใน sheet = ซ่อน
    else if (d < -2) bar.classList.remove("scroll-hide"); // ⬆️ เลื่อนขึ้นใน sheet = โชว์
  }, true); // capture=true เพื่อจับ element scroll
})();

// 🔍 DEBUG: Trace CSS winners for #floatingBar
// เป้าหมาย: หา "rule ไหน" ที่ชนะ opacity/transform จริง
// =========================
window.traceBarCSS = function traceBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[traceBarCSS] #floatingBar not found"); return []; }

  const props = ["opacity","transform","pointer-events"];
  const out = [];

  const tryPushRule = (sheet, rule, ruleIndex, sel) => {
    const style = rule.style;
    const hit = {
      sheet: sheet.href || "[inline <style>]",
      ruleIndex,
      selector: sel,
      cssText: rule.cssText
    };
    // เก็บเฉพาะค่าที่เกี่ยวข้อง
    props.forEach(p => {
      const v = style.getPropertyValue(p);
      if (v) {
        hit[p] = v.trim();
        hit[p + "_important"] = style.getPropertyPriority(p) === "important";
      }
    });
    // ดันเฉพาะ rule ที่แตะ props จริง
    if (props.some(p => hit[p])) out.push(hit);
  };

  for (const sheet of Array.from(document.styleSheets)) {
    let rules;
    try { rules = sheet.cssRules; } catch(e) { continue; } // cross-origin
    if (!rules) continue;

    for (let i = 0; i < rules.length; i++) {
      const r = rules[i];
      if (!r || !r.selectorText) continue;
      // รองรับ selector หลายตัวคั่นด้วย comma
      const sels = r.selectorText.split(",").map(s => s.trim()).filter(Boolean);
      for (const sel of sels) {
        try {
          if (bar.matches(sel)) {
            tryPushRule(sheet, r, i, sel);
          }
        } catch(_) {}
      }
    }
  }

  const cs = getComputedStyle(bar);
  console.log("===== traceBarCSS =====");
  console.log("className:", bar.className);
  console.table({
    computed_opacity: cs.opacity,
    computed_transform: cs.transform,
    computed_pointerEvents: cs.pointerEvents
  });
  console.table(out);
  return out;
};

window.watchBarCSS = function watchBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[watchBarCSS] #floatingBar not found"); return; }
  if (bar.__watchingCSS) { console.warn("[watchBarCSS] already watching"); return; }
  bar.__watchingCSS = true;

  const mo = new MutationObserver(() => {
    // trace หลัง DOM อัปเดตแล้ว 1 เฟรม (กันอ่านค่าก่อน apply)
    requestAnimationFrame(() => window.traceBarCSS());
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["class","style"] });
  bar.__watchMO = mo;
  console.log("✅ watching #floatingBar class/style changes");
  window.traceBarCSS();
};

// =========================
// 🕵️ SPY: ใครเป็นคนแก้ class/style ของ #floatingBar
// ใช้: spyBar(); แล้วลองเลื่อน/เปิดปิด sheet/เพิ่มของในตะกร้า
// =========================
window.spyBar = function spyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[spyBar] #floatingBar not found"); return; }
  if (bar.__spyInstalled) { console.warn("[spyBar] already installed"); return; }
  bar.__spyInstalled = true;

  // 1) spy classList.add/remove/toggle
  const cl = bar.classList;
  ["add","remove","toggle"].forEach((m) => {
    const orig = cl[m].bind(cl);
    cl[m] = (...args) => {
      console.groupCollapsed(`🧩 [spyBar] classList.${m}(${args.join(", ")})  | before="${bar.className}"`);
      console.trace();
      const r = orig(...args);
      console.log(`after="${bar.className}"`);
      console.groupEnd();
      return r;
    };
  });

  // 2) spy style attribute changes (รวมถึง bar.style.opacity/transform ที่ไปลงเป็น inline)
  const mo = new MutationObserver((list) => {
    for (const it of list) {
      if (it.type === "attributes" && it.attributeName === "style") {
        console.groupCollapsed(`🎨 [spyBar] style changed: ${bar.getAttribute("style") || "(empty)"}`);
        console.trace();
        console.groupEnd();
      }
    }
  });
  mo.observe(bar, { attributes: true, attributeFilter: ["style"] });
  bar.__spyMO = mo;

  console.log("✅ spyBar installed. Now reproduce the bug.");
};

window.unspyBar = function unspyBar(){
  const bar = document.getElementById("floatingBar");
  if (!bar) return;
  if (bar.__spyMO) bar.__spyMO.disconnect();
  bar.__spyMO = null;
  bar.__spyInstalled = false;
  console.log("🛑 spyBar removed (note: classList methods won't auto-restore after override)");
};  

window.unwatchBarCSS = function unwatchBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar || !bar.__watchMO) return;
  bar.__watchMO.disconnect();
  bar.__watchMO = null;
  bar.__watchingCSS = false;
  console.log("🛑 stop watching #floatingBar");
};
